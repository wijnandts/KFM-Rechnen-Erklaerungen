<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Übung: Kassenabrechnung</title>
    <style>
        :root { --main: #f1c40f; --dark: #9a7d0a; }
        body { font-family: sans-serif; background: #ecf0f1; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        .question { margin-bottom: 20px; padding: 15px; border-left: 5px solid var(--main); background: #f9f9f9; }
        input { padding: 8px; width: 120px; }
        button { background: var(--dark); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Übung: Kassenabrechnung</h1>
        <p>Berechne die Bestände und Differenzen.</p>
        <div id="quiz-container"></div>
        <button onclick="checkAnswers()">Prüfen</button>
    </div>

    <script>
        const pool = [
            { q: "Sollbestand: 5.692,45€ (Barverkäufe) + 351,00€ (Wechselgeld) - 31,60€ (Ausgabe). Wie hoch ist der Soll-Bestand?", a: 6011.85 },
            { q: "Kassenbestand Abend: 11.995,20€. Wechselgeld Morgen: 321,30€. Privateinnahme: 50€. Geschäftsausgabe: 740€. Kartenzahlung: 4.046€. Bankeinzahlung: 668€. Wie hoch waren die Barverkäufe?", a: 17077.90 }
        ];

        // Hier können ebenfalls durch Variation der Werte 30 Varianten erstellt werden.
        const selected = pool; // Für Kasse starten wir mit den Originalbeispielen.
        const container = document.getElementById('quiz-container');

        selected.forEach((item, index) => {
            container.innerHTML += `<div class="question"><p>${item.q}</p><input type="number" step="0.01" id="q${index}"> <div id="f${index}"></div></div>`;
        });

        function checkAnswers() {
            selected.forEach((item, index) => {
                const val = parseFloat(document.getElementById(`q${index}`).value);
                const f = document.getElementById(`f${index}`);
                if(Math.abs(val - item.a) < 0.05) { f.innerHTML = "✅"; f.style.color="green"; }
                else { f.innerHTML = "❌ Korrekt: " + item.a; f.style.color="red"; }
            });
        }
    </script>
</body>
</html>
