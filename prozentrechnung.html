<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training: Prozentrechnung</title>
    <style>
        :root {
            --main: #e17055;
            --main-dark: #d35400;
            --light: #fab1a0;
            --bg: #f5f6fa;
            --border-dark: #2d3436;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            color: var(--border-dark);
        }

        .card {
            background: var(--white);
            border: 2px solid var(--border-dark);
            width: 100%;
            max-width: 950px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 10px 10px 0px var(--border-dark);
        }

        .header-row {
            display: flex;
            align-items: center;
            margin-bottom: 35px;
            gap: 20px;
        }

        .back-btn {
            font-size: 0.95rem;
            text-decoration: none;
            color: var(--border-dark);
            font-weight: 600;
            display: flex;
            align-items: center;
            padding: 8px 15px;
            border-radius: 8px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .back-btn:hover {
            background: var(--light);
            border-color: var(--border-dark);
        }

        .main-title {
            border: 3px solid var(--main);
            border-radius: 30px;
            padding: 8px 40px;
            font-weight: 800;
            color: var(--main);
            text-transform: uppercase;
            margin-left: auto;
        }

        .grid-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-bottom: 35px;
        }

        .topic-button {
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 15px 10px;
            background: var(--white);
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .topic-button.active {
            background: var(--main);
            color: var(--white);
            box-shadow: 4px 4px 0px var(--border-dark);
        }

        .task-box {
            border: 2px solid var(--border-dark);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            min-height: 160px;
            background: #fffdfb;
        }

        .label {
            font-weight: 900;
            font-size: 1.3rem;
            display: block;
            margin-bottom: 15px;
            color: var(--main);
            text-transform: uppercase;
        }

        .input-area {
            border: 2px solid var(--border-dark);
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            background: var(--white);
        }

        .input-area input {
            border: none;
            border-bottom: 3px solid var(--light);
            width: 100%;
            font-size: 1.4rem;
            padding: 5px;
            outline: none;
            font-weight: 600;
        }

        .footer-actions {
            display: flex;
            gap: 20px;
        }

        .btn-action {
            flex: 1;
            border: 2px solid var(--border-dark);
            border-radius: 15px;
            padding: 22px;
            text-align: center;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-feedback { background: var(--main); color: var(--white); }
        .btn-next { background: #dfe6e9; }

        .correct-anim { background: #27ae60 !important; color: white !important; }
        .wrong-anim { background: #d63031 !important; color: white !important; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-row">
            <a href="index.html" class="back-btn">← DASHBOARD</a>
            <div class="main-title">Prozentrechnung</div>
        </div>

        <div class="grid-row">
            <div class="topic-button active" onclick="setTopic('W', this)">Prozentwert</div>
            <div class="topic-button" onclick="setTopic('p', this)">Prozentsatz</div>
            <div class="topic-button" onclick="setTopic('G', this)">Grundwert</div>
            <div class="topic-button" onclick="setTopic('Gplus', this)">Vermehrter GW</div>
            <div class="topic-button" onclick="setTopic('Gminus', this)">Verminderter GW</div>
        </div>

        <div class="task-box">
            <span class="label">Aufgabe</span>
            <p id="question-text" style="font-size: 1.25rem; line-height: 1.6; margin: 0;">Lade Aufgabe...</p>
        </div>

        <div class="input-area">
            <label style="font-weight:800; margin-right:20px;">LÖSUNG</label>
            <input type="number" id="user-val" placeholder="0,00" step="0.01">
            <span id="unit" style="margin-left:15px; font-weight:800; color:var(--main);"></span>
        </div>

        <div class="footer-actions">
            <div id="feedback-btn" class="btn-action btn-feedback" onclick="validate()">
                <span id="res-label">Prüfen</span>
            </div>
            <div class="btn-action btn-next" onclick="nextTask()">Nächste</div>
        </div>
    </div>

    <script>
        const taskPool = {
            'W': [
                { q: "Ein Händler kauft Ware für 4.500 €. Er erhält 12 % Rabatt. Wie viel Euro spart er?", a: 540, u: "€" },
                { q: "Von 850 Mitarbeitern sind 6 % im Außendienst tätig. Wie viele Personen sind das?", a: 51, u: "Pers." },
                { q: "Eine Versicherung erstattet 65 % eines Schadens von 2.400 €. Wie hoch ist die Erstattung?", a: 1560, u: "€" },
                { q: "Ein Kunde zahlt eine Rechnung von 1.200 € unter Abzug von 3 % Skonto. Wie hoch ist der Skontobetrag?", a: 36, u: "€" }
            ],
            'p': [
                { q: "Ein Vertreter erhält 450 € Provision für einen Umsatz von 9.000 €. Wie viel Prozent sind das?", a: 5, u: "%" },
                { q: "Ein PC wurde von 800 € auf 680 € reduziert. Wie hoch ist der Prozentsatz des Rabatts?", a: 15, u: "%" },
                { q: "In einer Klasse mit 25 Schülern fehlen heute 2 Schüler. Wie hoch ist die Fehlquote in Prozent?", a: 8, u: "%" },
                { q: "Von 1.250 produzierten Teilen sind 50 fehlerhaft. Wie hoch ist der Ausschussanteil?", a: 4, u: "%" }
            ],
            'G': [
                { q: "Ein Mieter zahlt 180 € Nebenkosten. Das sind 15 % der Gesamtmiete. Wie hoch ist die Gesamtmiete?", a: 1200, u: "€" },
                { q: "Ein Skonto-Abzug von 2 % entspricht 44 €. Wie hoch war der ursprüngliche Rechnungsbetrag?", a: 2200, u: "€" },
                { q: "24 Schüler einer Schule sind in der Theater-AG. Das sind 6 % aller Schüler. Wie viele Schüler hat die Schule?", a: 400, u: "Schüler" },
                { q: "Eine Provision von 4 % ergibt 160 €. Welcher Umsatz wurde erzielt?", a: 4000, u: "€" }
            ],
            'Gplus': [
                { q: "Ein Fernseher kostet inklusive 19 % USt 1.190 €. Wie hoch ist der Nettopreis?", a: 1000, u: "€" },
                { q: "Ein Rechnungsbetrag von 535,50 € enthält 19 % USt. Berechne den Nettowert.", a: 450, u: "€" },
                { q: "Nach einer Mieterhöhung um 5 % zahlt eine Familie 840 €. Wie hoch war die Miete vorher?", a: 800, u: "€" },
                { q: "Ein Preis stieg um 20 % auf 144 €. Wie hoch war der ursprüngliche Preis?", a: 120, u: "€" }
            ],
            'Gminus': [
                { q: "Nach Abzug von 10 % Rabatt kostet ein Handy noch 360 €. Wie hoch war der Originalpreis?", a: 400, u: "€" },
                { q: "Ein Wintermantel wurde um 30 % reduziert und kostet nun 140 €. Was kostete er vorher?", a: 200, u: "€" },
                { q: "Eine Flasche enthält nach 20 % Entnahme noch 400 ml. Wie viel war ursprünglich enthalten?", a: 500, u: "ml" },
                { q: "Nach 2 % Skonto-Abzug zahlt ein Kunde 1.470 €. Wie hoch war der Rechnungsbetrag?", a: 1500, u: "€" }
            ]
        };

        let currentCategory = 'W';
        let currentTask = null;

        function setTopic(cat, element) {
            currentCategory = cat;
            document.querySelectorAll('.topic-button').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            nextTask();
        }

        function nextTask() {
            const tasks = taskPool[currentCategory];
            currentTask = tasks[Math.floor(Math.random() * tasks.length)];
            document.getElementById('question-text').innerText = currentTask.q;
            document.getElementById('unit').innerText = currentTask.u;
            document.getElementById('res-label').innerText = "Prüfen";
            document.getElementById('feedback-btn').className = "btn-action btn-feedback";
            document.getElementById('user-val').value = "";
            document.getElementById('user-val').focus();
        }

        function validate() {
            const val = parseFloat(document.getElementById('user-val').value);
            const fbBtn = document.getElementById('feedback-btn');
            if (isNaN(val)) return;
            if (Math.abs(val - currentTask.a) < 0.01) {
                document.getElementById('res-label').innerText = "Korrekt!";
                fbBtn.className = "btn-action btn-feedback correct-anim";
            } else {
                document.getElementById('res-label').innerText = "Lösung: " + currentTask.a;
                fbBtn.className = "btn-action btn-feedback wrong-anim";
            }
        }

        nextTask();
    </script>
</body>
</html>
