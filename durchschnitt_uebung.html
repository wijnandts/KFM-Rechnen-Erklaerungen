<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durchschnitts-Master Pro</title>
    <style>
        :root {
            --main: #4834d4;
            --main-hover: #3c2bb3;
            --bg: #f0f2f5;
            --text: #2d3436;
            --white: #ffffff;
            --grey: #636e72;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-link {
            align-self: flex-start;
            text-decoration: none;
            color: var(--grey);
            font-size: 0.9rem;
            margin-bottom: 20px;
            max-width: 1100px;
            width: 100%;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin: 0 0 5px 0;
        }

        .subtitle {
            color: #95a5a6;
            margin-bottom: 30px;
            border-bottom: 2px solid #f1f1f1;
            padding-bottom: 20px;
        }

        .question-box {
            background: #f9f9fb;
            border-left: 5px solid var(--main);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            min-height: 80px;
            font-size: 1.15rem;
            line-height: 1.6;
            color: #34495e;
        }

        .warning-text {
            color: #d35400;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 15px;
            background: #fff3e0;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--main);
            box-shadow: 0 0 8px rgba(72, 52, 212, 0.2);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .btn-primary { background: var(--main); color: white; }
        .btn-primary:hover { background: var(--main-hover); transform: translateY(-1px); }
        .btn-secondary { background: #f1f2f6; color: var(--text); }
        .btn-secondary:hover { background: #dfe4ea; }

        /* Rechner Style */
        .calc-container {
            background: #2d3436;
            border-radius: 15px;
            padding: 20px;
            height: fit-content;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .calc-header {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #b2bec3;
        }

        #calc-display {
            background: #3d4648;
            padding: 15px;
            text-align: right;
            font-size: 1.6rem;
            border-radius: 8px;
            margin-bottom: 20px;
            min-height: 2rem;
            font-family: monospace;
            color: #55efc4;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-btn {
            background: #4b5456;
            border: none;
            padding: 18px 10px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .calc-btn.op { background: var(--main); }
        .calc-btn.clear { background: #e17055; }
        .calc-btn.equal { background: #00b894; grid-column: span 3; }
        .calc-btn:active { transform: scale(0.95); }

        #feedback {
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.1rem;
        }

        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; }
            .calc-container { order: -1; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Zurück zum Dashboard</a>

    <div class="main-layout">
        <div class="card">
            <h1>Durchschnitts-Master Pro</h1>
            <p class="subtitle">Übungsmodul für Mittelwerte und kaufmännische Kalkulationen</p>

            <div id="quiz-area">
                <div class="question-box" id="question-text">Lade neue Textaufgabe...</div>
                
                <div class="warning-text">⚠️ Info: Bitte das Ergebnis kaufmännisch auf 2 Stellen runden!</div>
                
                <div id="feedback"></div>
                <input type="number" id="user-answer" placeholder="Dein Ergebnis eingeben" step="0.01">

                <button class="btn btn-primary" onclick="checkCurrentAnswer()">Antwort prüfen</button>
                <button class="btn btn-secondary" onclick="generateTextTask()">Nächste Aufgabe</button>
            </div>
        </div>

        <div class="calc-container">
            <div class="calc-header">RECHNER</div>
            <div id="calc-display">0</div>
            <div class="calc-grid">
                <button class="calc-btn clear" onclick="clearCalc()">C</button>
                <button class="calc-btn op" onclick="calcOp('/')">÷</button>
                <button class="calc-btn op" onclick="calcOp('*')">×</button>
                <button class="calc-btn op" onclick="calcOp('-')">-</button>
                
                <button class="calc-btn" onclick="addNum('7')">7</button>
                <button class="calc-btn" onclick="addNum('8')">8</button>
                <button class="calc-btn" onclick="addNum('9')">9</button>
                <button class="calc-btn op" onclick="calcOp('+')">+</button>
                
                <button class="calc-btn" onclick="addNum('4')">4</button>
                <button class="calc-btn" onclick="addNum('5')">5</button>
                <button class="calc-btn" onclick="addNum('6')">6</button>
                <button class="calc-btn" onclick="addNum('.')">,</button>
                
                <button class="calc-btn" onclick="addNum('1')">1</button>
                <button class="calc-btn" onclick="addNum('2')">2</button>
                <button class="calc-btn" onclick="addNum('3')">3</button>
                <button class="calc-btn" onclick="addNum('0')">0</button>
                
                <button class="calc-btn equal" onclick="calculateResult()">=</button>
            </div>
        </div>
    </div>

    <script>
        let currentTask;

        function generateTextTask() {
            const scenarios = [
                () => {
                    const v1 = Math.floor(Math.random() * 500 + 100);
                    const v2 = Math.floor(Math.random() * 500 + 100);
                    const v3 = Math.floor(Math.random() * 500 + 100);
                    return {
                        q: `Ein Einzelhändler erzielte in drei aufeinanderfolgenden Tagen folgende Umsätze: ${v1} €, ${v2} € und ${v3} €. Berechne den durchschnittlichen Tagesumsatz.`,
                        a: (v1 + v2 + v3) / 3
                    };
                },
                () => {
                    const m1 = Math.floor(Math.random() * 20 + 5);
                    const p1 = (Math.random() * 10 + 2).toFixed(2);
                    const m2 = Math.floor(Math.random() * 20 + 5);
                    const p2 = (Math.random() * 10 + 2).toFixed(2);
                    const gesamt = (m1 * p1 + m2 * p2) / (m1 + m2);
                    return {
                        q: `Für eine Hausmischung werden ${m1} kg Kaffee der Sorte A (Preis: ${p1} €/kg) mit ${m2} kg der Sorte B (Preis: ${p2} €/kg) gemischt. Was kostet ein Kilo der Mischung im Durchschnitt?`,
                        a: gesamt
                    };
                },
                () => {
                    const werte = [
                        Math.floor(Math.random() * 10 + 20),
                        Math.floor(Math.random() * 10 + 20),
                        Math.floor(Math.random() * 10 + 20),
                        Math.floor(Math.random() * 10 + 20)
                    ];
                    const sum = werte.reduce((a, b) => a + b, 0);
                    return {
                        q: `In einer Abteilung arbeiten 4 Mitarbeiter. Diese sind ${werte[0]}, ${werte[1]}, ${werte[2]} und ${werte[3]} Jahre alt. Wie hoch ist das Durchschnittsalter des Teams?`,
                        a: sum / 4
                    };
                },
                () => {
                    const m1 = Math.floor(Math.random() * 100 + 50);
                    const p1 = (Math.random() * 40 + 10).toFixed(2);
                    const m2 = Math.floor(Math.random() * 100 + 50);
                    const p2 = (Math.random() * 40 + 10).toFixed(2);
                    return {
                        q: `Ein Lager erhält zwei Lieferungen Rohstoffe: ${m1} Einheiten zu je ${p1} € und ${m2} Einheiten zu je ${p2} €. Bestimme den gewogenen Durchschnittspreis pro Einheit.`,
                        a: (m1 * p1 + m2 * p2) / (m1 + m2)
                    };
                }
            ];

            currentTask = scenarios[Math.floor(Math.random() * scenarios.length)]();
            document.getElementById('question-text').innerText = currentTask.q;
            document.getElementById('user-answer').value = '';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('user-answer').style.borderColor = '#dfe6e9';
        }

        function checkCurrentAnswer() {
            const userVal = parseFloat(document.getElementById('user-answer').value);
            const feedback = document.getElementById('feedback');
            const input = document.getElementById('user-answer');

            if(isNaN(userVal)) return;

            // Kaufmännische Rundungstoleranz
            const correct = Math.round(currentTask.a * 100) / 100;
            
            if(Math.abs(userVal - correct) < 0.01) {
                feedback.innerHTML = "✅ Hervorragend! Das Ergebnis ist korrekt.";
                feedback.style.color = "#27ae60";
                input.style.borderColor = "#27ae60";
            } else {
                feedback.innerHTML = `❌ Nicht ganz. Das richtige Ergebnis ist ${correct.toFixed(2)}.`;
                feedback.style.color = "#e17055";
                input.style.borderColor = "#e17055";
            }
        }

        // Rechner Funktionalität
        let calcExpression = "";
        function addNum(n) { calcExpression += n; updateDisplay(); }
        function calcOp(op) { calcExpression += op; updateDisplay(); }
        function clearCalc() { calcExpression = ""; updateDisplay(); }
        function updateDisplay() { 
            document.getElementById('calc-display').innerText = calcExpression || "0"; 
        }
        function calculateResult() {
            try {
                let result = eval(calcExpression);
                calcExpression = Number.isInteger(result) ? result.toString() : result.toFixed(2);
                updateDisplay();
            } catch {
                calcExpression = "Fehler";
                updateDisplay();
                setTimeout(clearCalc, 1000);
            }
        }

        // Initiale Aufgabe
        generateTextTask();
    </script>
</body>
</html>
