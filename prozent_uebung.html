<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training: Prozentrechnung</title>
    <style>
        :root {
            --main: #e17055;
            --light: #fab1a0;
            --bg: #ecf0f1;
            --border-dark: #2d3436;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            border: 2px solid var(--border-dark);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .header-row {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            font-size: 0.9rem;
            text-decoration: none;
            color: var(--border-dark);
            margin-right: auto;
        }

        .main-title {
            border: 2px solid var(--main);
            border-radius: 20px;
            padding: 6px 35px;
            font-weight: bold;
            color: var(--main);
            text-transform: uppercase;
        }

        /* Themen-Navigation */
        .grid-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .topic-button {
            border: 2px solid var(--main);
            border-radius: 12px;
            padding: 10px 18px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            color: var(--main);
            font-size: 0.85rem;
            transition: all 0.2s;
            flex: 1;
            min-width: 160px;
            text-align: center;
        }

        .topic-button.active {
            background: var(--main);
            color: white;
        }

        /* Aufgaben-Box */
        .task-box {
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            min-height: 180px;
            background: #fdfdfd;
        }

        .label {
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 15px;
            color: var(--main);
        }

        /* Lösung */
        .input-area {
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            background: #fff;
        }

        .input-area label {
            font-weight: bold;
            margin-right: 15px;
            font-size: 1.1rem;
        }

        .input-area input {
            border: none;
            border-bottom: 2px solid var(--light);
            width: 100%;
            font-size: 1.2rem;
            padding: 5px;
            outline: none;
        }

        /* Footer Buttons */
        .footer-actions {
            display: flex;
            gap: 20px;
        }

        .btn-action {
            flex: 1;
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            background: white;
            text-transform: uppercase;
        }

        .btn-feedback { border-color: var(--main); color: var(--main); }
        .btn-next { background: var(--bg); }

        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: var(--main); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-row">
            <a href="#" class="back-btn">← zurück zum Dashboard</a>
            <div class="main-title">Prozentrechnung</div>
        </div>

        <div class="grid-row" id="topic-nav">
            <div class="topic-button active" onclick="setTopic('W')">Prozentwert</div>
            <div class="topic-button" onclick="setTopic('p')">Prozentsatz</div>
            <div class="topic-button" onclick="setTopic('G')">Grundwert</div>
            <div class="topic-button" onclick="setTopic('Gplus')">verm. Grundwert</div>
            <div class="topic-button" onclick="setTopic('Gminus')">verm. Grundwert</div>
        </div>

        <div class="task-box">
            <span class="label">Aufgabe:</span>
            <p id="question-text" style="font-size: 1.15rem; line-height: 1.6;">Wähle ein Thema aus.</p>
        </div>

        <div class="input-area">
            <label>Lösung:</label>
            <input type="number" id="user-val" placeholder="Ergebnis eingeben..." step="0.01">
            <span id="unit" style="margin-left: 10px; font-weight: bold;"></span>
        </div>

        <div class="footer-actions">
            <div class="btn-action btn-feedback" onclick="validate()">
                <span id="res-label">Rückmeldung</span>
            </div>
            <div class="btn-action btn-next" onclick="nextTask()">
                Nächste Aufgabe
            </div>
        </div>
    </div>

    <script>
        const taskPool = {
            'W': [
                { q: "Ein Händler gewährt auf ein Smartphone für 800 € einen Rabatt von 15 %. Berechne den Rabattbetrag in Euro.", a: 120, u: "€" },
                { q: "In einer Schulklasse mit 25 Schülern haben 12 % ihre Hausaufgaben vergessen. Wie viele Schüler sind das?", a: 3, u: "Schüler" }
            ],
            'p': [
                { q: "Ein gebrauchtes Fahrrad wurde von 400 € auf 340 € reduziert. Wie viel Prozent Rabatt wurden gewährt?", a: 15, u: "%" },
                { q: "Von 200 Mitarbeitern eines Betriebs sind heute 14 krankgemeldet. Wie hoch ist der Krankenstand in Prozent?", a: 7, u: "%" }
            ],
            'G': [
                { q: "Ein Mieter zahlt 120 € Nebenkosten. Das sind 20 % seiner Kaltmiete. Berechne die Kaltmiete.", a: 600, u: "€" },
                { q: "Ein Fußballverein hat 45 jugendliche Mitglieder, was genau 15 % der Gesamtmitglieder entspricht. Wie viele Mitglieder hat der Verein?", a: 300, u: "Mitglieder" }
            ],
            'Gplus': [
                { q: "Ein Preis steigt um 5 % auf 105,00 €. Wie hoch war der ursprüngliche Grundwert?", a: 100, u: "€" },
                { q: "Nach einer Lohnerhöhung um 8 % verdient ein Angestellter 3.240,00 €. Wie hoch war sein alter Lohn?", a: 3000, u: "€" }
            ],
            'Gminus': [
                { q: "Nach Abzug von 10 % Rabatt kostet ein Laptop noch 900,00 €. Wie hoch war der ursprüngliche Preis?", a: 1000, u: "€" },
                { q: "Eine Hose kostet im Sale nach 20 % Preisnachlass noch 64,00 €. Berechne den Originalpreis.", a: 80, u: "€" }
            ]
        };

        let currentCategory = 'W';
        let currentTask = null;

        function setTopic(cat) {
            currentCategory = cat;
            const buttons = document.querySelectorAll('.topic-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            nextTask();
        }

        function nextTask() {
            const tasks = taskPool[currentCategory];
            currentTask = tasks[Math.floor(Math.random() * tasks.length)];
            document.getElementById('question-text').innerText = currentTask.q;
            document.getElementById('unit').innerText = currentTask.u;
            document.getElementById('res-label').innerText = "Rückmeldung";
            document.getElementById('res-label').className = "";
            document.getElementById('user-val').value = "";
            document.getElementById('user-val').focus();
        }

        function validate() {
            if (!currentTask) return;
            const val = parseFloat(document.getElementById('user-val').value);
            const label = document.getElementById('res-label');
            if (Math.abs(val - currentTask.a) < 0.01) {
                label.innerText = "Korrekt! ✓";
                label.className = "correct";
            } else {
                label.innerText = "Falsch! Lösung: " + currentTask.a;
                label.className = "wrong";
            }
        }

        // Init
        nextTask();
    </script>
</body>
</html>
