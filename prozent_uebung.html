<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durchschnitts-Master Pro</title>
    <style>
        :root {
            --primary-violet: #3f3db5;
            --accent-orange: #e17055;
            --bg-light: #f8f9fa;
            --sidebar-dark: #2c3e50;
            --text-main: #2d3436;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-wrapper {
            display: flex;
            width: 95%;
            max-width: 1100px;
            gap: 25px;
            height: 650px;
        }

        /* Hauptbereich */
        .main-card {
            background: white;
            flex: 2;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 28px; margin: 0; color: var(--text-main); }
        .sub { color: #95a5a6; margin-bottom: 30px; font-size: 15px; }

        .task-container {
            flex-grow: 1;
            background: #fdfdfd;
            border-left: 6px solid var(--primary-violet);
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .task-type {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--primary-violet);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .info-strip {
            background: #fff5f0;
            color: var(--accent-orange);
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        input#user-input {
            width: 100%;
            padding: 18px;
            border: 2px solid #edeff2;
            border-radius: 10px;
            font-size: 20px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .btn-check {
            background: var(--primary-violet);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-check:hover { background: #3432a3; }

        .btn-next {
            background: #e2e6ea;
            color: #636e72;
            padding: 12px;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Sidebar & Rechner */
        .sidebar {
            flex: 1;
            background: var(--sidebar-dark);
            border-radius: 15px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .calc-display {
            background: #1a252f;
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
        }

        #calc-val { font-size: 32px; color: #2ecc71; display: block; }
        #calc-status { font-size: 12px; opacity: 0.6; }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .numpad button {
            background: #34495e;
            border: none;
            padding: 15px;
            color: white;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .numpad button:hover { background: #45627d; }
        .numpad button.op { background: var(--primary-violet); }
        .numpad button.clear { background: var(--accent-orange); }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="main-card">
        <h1>Durchschnitts-Master Pro</h1>
        <p class="sub">Übungsmodul für Mittelwerte und kaufmännische Kalkulationen</p>

        <div class="task-container">
            <span class="task-type" id="task-cat">Kategorie</span>
            <div id="task-text" style="font-size: 18px; line-height: 1.5;">Lade Aufgabe...</div>
        </div>

        <div class="info-strip">
            ⚠️ Info: Bitte das Ergebnis kaufmännisch auf 2 Stellen runden!
        </div>

        <input type="text" id="user-input" placeholder="0,00" readonly>
        
        <button class="btn-check" onclick="checkAnswer()">Antwort prüfen</button>
        <button class="btn-next" onclick="nextTask()">Nächste Aufgabe</button>
    </div>

    <div class="sidebar">
        <div style="font-size: 11px; letter-spacing: 1px; margin-bottom: 10px;">RECHNER / STATUS</div>
        <div class="calc-display">
            <span id="calc-val">0</span>
            <span id="calc-status">Bereit</span>
        </div>

        <div class="numpad">
            <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
            <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
            <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
            <button class="clear" onclick="press('C')">C</button><button onclick="press('0')">0</button><button onclick="press('.')">,</button>
        </div>
    </div>
</div>

<script>
    const pool = [
        {
            cat: "Mischungsrechnen",
            q: "Ein Teehändler mischt 15 kg Tee der Sorte 'Premium' (12,50 €/kg) mit 25 kg der Sorte 'Standard' (8,20 €/kg). Berechne den Durchschnittspreis pro Kilogramm für die neue Hausmischung.",
            a: 9.81
        },
        {
            cat: "Rückwärtskalkulation",
            q: "Ein Mantel wird für 178,50 € brutto verkauft (inkl. 19% USt). Der Händler gewährt heute 15% Rabatt auf den Bruttopreis. Wie hoch ist der neue Bruttoverkaufspreis?",
            a: 151.73
        },
        {
            cat: "Prozentrechnung",
            q: "Eine Rechnung über 1.250,00 € netto soll beglichen werden. Der Lieferant gewährt 3% Skonto bei Zahlung innerhalb von 7 Tagen. Wie viel Euro beträgt der Skontobetrag?",
            a: 37.50
        },
        {
            cat: "Umsatzsteuer",
            q: "Ein Bürostuhl kostet 249,00 € netto. Wie hoch ist der Endpreis (Brutto) für den Kunden bei einem Steuersatz von 19%?",
            a: 296.31
        },
        {
            cat: "Durchschnittswert",
            q: "Ein Vertreter fährt an drei Tagen folgende Strecken: 120 km, 245 km und 188 km. Wie viele Kilometer legte er im Durchschnitt pro Tag zurück?",
            a: 184.33
        }
    ];

    let currentTask;
    let inputStr = "";

    function nextTask() {
        currentTask = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('task-cat').innerText = currentTask.cat;
        document.getElementById('task-text').innerText = currentTask.q;
        document.getElementById('user-input').value = "";
        document.getElementById('calc-val').innerText = "0";
        document.getElementById('calc-val').style.color = "#2ecc71";
        document.getElementById('calc-status').innerText = "Bereit";
        inputStr = "";
    }

    function press(num) {
        if(num === 'C') {
            inputStr = "";
        } else {
            inputStr += num;
        }
        document.getElementById('user-input').value = inputStr.replace('.', ',');
        document.getElementById('calc-val').innerText = inputStr || "0";
    }

    function checkAnswer() {
        const userVal = parseFloat(inputStr);
        const display = document.getElementById('calc-val');
        const status = document.getElementById('calc-status');

        if(isNaN(userVal)) return;

        if(Math.abs(userVal - currentTask.a) < 0.011) {
            display.innerText = "RICHTIG";
            display.style.color = "#2ecc71";
            status.innerText = "Kaufmännisch korrekt!";
        } else {
            display.innerText = currentTask.a.toFixed(2).replace('.', ',');
            display.style.color = "#e17055";
            status.innerText = "Falsch. Lösung oben angezeigt.";
        }
    }

    // Start
    nextTask();
</script>
</body>
</html>
